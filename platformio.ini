; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html
;
; Bu projede en cok mudahale edilen yerler:
; - kart / port degisimi -> board, upload_port, monitor_port
; - hangi firmware derlenecek -> env secimi
; - sadece GPIO testi -> [env:esp32-s3-gpio-test]

[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
board_build.partitions = partitions/evse_ota.csv
board_build.arduino.custom_sdkconfig = sdkconfig.defaults
; Ana firmware env'i. Normal kullanimda yuklenen hedef budur.
; Not: COM4 bu makinede Bluetooth seri portu olarak gorunuyor.
; ESP32-S3 kart su an USB-Enhanced-SERIAL CH343 olarak COM7'de.
monitor_port = COM7
upload_port = COM7
monitor_speed = 115200
build_src_filter =
	+<*>
	-<gpio_test_main.cpp>
build_unflags =
	-DARDUINO_USB_MODE=1
build_flags = 
	-DARDUINO_USB_CDC_ON_BOOT=0
	-DARDUINO_USB_MODE=0
	-DAPP_LOG_LEVEL=3
	-DEVSE_AP_SSID=\"EVSE\"
	-DEVSE_AP_PASSWORD=\"12345678\"
	-DEVSE_ADMIN_USER=\"admin\"
	-DEVSE_ADMIN_PASSWORD=\"rotosis123\"
	-DEVSE_HOSTNAME=\"evse\"
	-DEVSE_OTA_HOSTNAME=\"evse\"
	-DEVSE_OTA_PASSWORD=\"\"
	-DEVSE_WIFI_1_LOC=\"Ev\"
	-DEVSE_WIFI_1_SSID=\"FiberHGW_ZTN2TY\"
	-DEVSE_WIFI_1_PASS=\"PzeuKE7X44Rs\"
	-DEVSE_WIFI_2_LOC=\"Rotosis\"
	-DEVSE_WIFI_2_SSID=\"Rotosis_Ofis\"
	-DEVSE_WIFI_2_PASS=\"Rotosis2020\"
	-DEVSE_WIFI_3_LOC=\"CeylanRobot\"
	-DEVSE_WIFI_3_SSID=\"CEYLAN-ROBOT\"
	-DEVSE_WIFI_3_PASS=\"Mahfer123.\"
	-DEVSE_WIFI_4_LOC=\"RotosisAtolye\"
	-DEVSE_WIFI_4_SSID=\"Rotosis_Atolye\"
	-DEVSE_WIFI_4_PASS=\"Rotosis2021@\"
	-DEVSE_WIFI_5_LOC=\"Test\"
	-DEVSE_WIFI_5_SSID=\"test\"
	-DEVSE_WIFI_5_PASS=\"12345678\"
upload_speed = 921600
lib_deps = 
	olikraus/U8g2 @ ^2.36.0
	ayushsharma82/ElegantOTA
	openenergymonitor/EmonLib@^1.1.0
	bblanchon/ArduinoJson @ ^6.21.0

[env:esp32-s3-devkitc-1-ota]
extends = env:esp32-s3-devkitc-1
; Ayni firmware'i kablosuz OTA ile yuklemek icin.
upload_protocol = espota
upload_port = evse.local
; EVSE_OTA_PASSWORD bos degilse:
; upload_flags =
;   --auth=sifreyi_buraya_yaz

[env:esp32-s3-gpio-test]
extends = env:esp32-s3-devkitc-1
; Ana uygulamayi derlemez. Sadece src/gpio_test_main.cpp icindeki test kodunu yukler.
build_src_filter =
  -<*>
  +<gpio_test_main.cpp>


